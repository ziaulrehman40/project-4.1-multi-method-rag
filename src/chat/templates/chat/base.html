<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Compliance Chat{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.10"></script>
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
  <script>
    document.addEventListener("htmx:beforeSwap", function (event) {
      if (event.detail.xhr.status === 502) {
        event.detail.shouldSwap = true;
        event.detail.isError = false;
      }
    });
    // Prevent double-submission: disable buttons on plain (non-HTMX) form submits.
    // HTMX forms use hx-disabled-elt instead, which also re-enables after the request.
    document.addEventListener("submit", function (event) {
      var form = event.target;
      if (event.defaultPrevented) return;        // e.g. a cancelled confirm() dialog
      if (form.hasAttribute("hx-post")) return;  // HTMX handles these
      form.querySelectorAll("button").forEach(function (b) { b.disabled = true; });
    });

    // Render knowledge-graph traces as interactive vis-network graphs. Each ".kg-graph"
    // holds a JSON <script> (the edge trace); build nodes/edges from it once.
    function renderGraphTraces(root) {
      (root || document).querySelectorAll(".kg-graph").forEach(function (el) {
        if (el.dataset.rendered || typeof vis === "undefined") return;
        var dataEl = el.querySelector('script[type="application/json"]');
        if (!dataEl) return;
        el.dataset.rendered = "1";
        var trace = JSON.parse(dataEl.textContent);
        var nodeIds = {}, edges = [];
        trace.forEach(function (t) {
          nodeIds[t.subject] = true; nodeIds[t.object] = true;
          edges.push({ from: t.subject, to: t.object, label: t.predicate, arrows: "to" });
        });
        var nodes = Object.keys(nodeIds).map(function (n) { return { id: n, label: n }; });
        var canvas = document.createElement("div");
        canvas.style.height = "320px";
        el.appendChild(canvas);
        new vis.Network(
          canvas,
          { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) },
          { nodes: { shape: "dot", size: 10, font: { size: 12 } },
            edges: { font: { size: 10, align: "middle" }, color: "#889" },
            physics: { stabilization: true } }
        );
      });
    }
    // Render vectorless navigation paths as a hierarchical tree, built from the section
    // breadcrumbs in the trace (split on " › "); the opened leaf sections are highlighted.
    function renderVectorlessTrees(root) {
      (root || document).querySelectorAll(".vl-tree").forEach(function (el) {
        if (el.dataset.rendered || typeof vis === "undefined") return;
        var dataEl = el.querySelector('script[type="application/json"]');
        if (!dataEl) return;
        el.dataset.rendered = "1";
        var trace = JSON.parse(dataEl.textContent);
        var byId = {}, edges = {}, SEP = " › ";
        trace.forEach(function (t) {
          var parts = t.path.split(SEP), cum = "";
          for (var i = 0; i < parts.length; i++) {
            var prev = cum;
            cum = i === 0 ? parts[0] : cum + SEP + parts[i];
            if (!byId[cum]) byId[cum] = { id: cum, label: parts[i], level: i };
            if (prev) edges[prev + "|" + cum] = { from: prev, to: cum, arrows: "to" };
          }
          byId[cum].selected = true;  // the opened section
        });
        var nodes = Object.keys(byId).map(function (k) {
          var n = byId[k];
          return { id: n.id, label: n.label, level: n.level,
                   color: n.selected ? { background: "#174ea6", border: "#12315f" }
                                      : { background: "#dce3ee", border: "#b8c4d6" },
                   font: n.selected ? { color: "#fff" } : {} };
        });
        var canvas = document.createElement("div");
        canvas.style.height = "300px";
        el.appendChild(canvas);
        new vis.Network(
          canvas,
          { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(Object.values(edges)) },
          { layout: { hierarchical: { direction: "UD", sortMethod: "directed", levelSeparation: 80 } },
            physics: false, nodes: { shape: "box", font: { size: 12 } }, edges: { color: "#889" } }
        );
      });
    }

    function renderAll(root) { renderGraphTraces(root); renderVectorlessTrees(root); }
    document.addEventListener("DOMContentLoaded", function () { renderAll(); });
    document.addEventListener("htmx:afterSwap", function (e) { renderAll(e.target); });
  </script>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; color: #172033; background: #f4f7fb; }
    * { box-sizing: border-box; }
    body { margin: 0; }
    a { color: #174ea6; }
    button, input, textarea { font: inherit; }
    button { border: 0; border-radius: .55rem; padding: .65rem .9rem; cursor: pointer; background: #174ea6; color: white; }
    button.danger { background: #a52626; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .warn { color: #a52626; font-weight: 600; margin: .5rem 0 0; }
    .rag-details { margin-top: .6rem; font-size: .92em; }
    .rag-details summary { cursor: pointer; color: #174ea6; }
    .shell { width: min(960px, calc(100% - 2rem)); margin: 0 auto; }
    header { background: #13213c; color: white; padding: .8rem 0; }
    header .shell { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    header a { color: white; text-decoration: none; font-weight: 700; }
    header form { margin: 0; }
    main { padding: 2rem 0 4rem; }
    .card { background: white; border: 1px solid #dce3ee; border-radius: .8rem; padding: 1.1rem; box-shadow: 0 5px 18px rgba(29, 48, 78, .06); }
    .stack { display: grid; gap: 1rem; }
    .row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }
    .row.space { justify-content: space-between; }
    input, textarea { width: 100%; border: 1px solid #b8c4d6; border-radius: .55rem; padding: .7rem; background: white; }
    .inline-input { width: min(22rem, 100%); }
    .muted { color: #657189; }
    .message { max-width: 82%; border-radius: .8rem; padding: .85rem 1rem; white-space: pre-wrap; }
    .message.user { margin-left: auto; background: #174ea6; color: white; }
    .message.assistant { background: white; border: 1px solid #dce3ee; }
    .message small { display: block; opacity: .72; margin-bottom: .35rem; text-transform: capitalize; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { display: inline; }
    @media (max-width: 600px) { .message { max-width: 94%; } }
  </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  <header>
    <div class="shell">
      <a href="{% url 'conversation-list' %}">Compliance Chat</a>
      {% if request.user.is_authenticated %}
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Log out</button>
        </form>
      {% endif %}
    </div>
  </header>
  <main class="shell">{% block content %}{% endblock %}</main>
</body>
</html>
